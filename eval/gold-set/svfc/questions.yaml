# ─── Trend / Comparison (6) ──────────────────────────────

- id: Q-SVFC-022
  question: "How has monthly disbursement trended over the last 12 months?"
  question_vi: "Xu hướng giải ngân hàng tháng 12 tháng gần nhất?"
  bu: svfc
  intent_class: trend
  sensitivity_tier: internal
  expected_metric: monthly-disbursement-trend@1.0.0
  expected_sql: "SELECT DATE_TRUNC('month', originated_at) AS month, SUM(principal_vnd) FROM svfc.loans WHERE originated_at >= CURRENT_DATE - INTERVAL '12 months' AND tenant_id = :tenant_id GROUP BY month ORDER BY month"
  expected_answer_shape: chart
  expected_numeric_range: null
  expected_citations: { count_min: 3, source_columns: [principal_vnd, originated_at] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-svfc"

- id: Q-SVFC-023
  question: "Compare NPL ratio between Northern and Southern branches"
  bu: svfc
  intent_class: comparison
  sensitivity_tier: internal
  expected_metric: npl-by-region@1.0.0
  expected_sql: "SELECT b.region, COUNT(CASE WHEN l.dpd > 90 THEN 1 END)::NUMERIC / COUNT(*) * 100 AS npl_pct FROM svfc.loans l JOIN svfc.branches b ON l.branch_id = b.id WHERE l.tenant_id = :tenant_id GROUP BY b.region"
  expected_answer_shape: table
  expected_numeric_range: null
  expected_citations: { count_min: 2, source_columns: [dpd, region] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-svfc"

- id: Q-SVFC-024
  question: "Which product has the highest growth in origination volume this year vs last year?"
  bu: svfc
  intent_class: comparison
  sensitivity_tier: internal
  expected_metric: product-growth-yoy@1.0.0
  expected_sql: "SELECT product_id, SUM(CASE WHEN originated_at >= '2026-01-01' THEN principal_vnd ELSE 0 END) - SUM(CASE WHEN originated_at >= '2025-01-01' AND originated_at < '2026-01-01' THEN principal_vnd ELSE 0 END) AS growth FROM svfc.loans WHERE tenant_id = :tenant_id GROUP BY product_id ORDER BY growth DESC LIMIT 1"
  expected_answer_shape: number
  expected_numeric_range: null
  expected_citations: { count_min: 1, source_columns: [principal_vnd, product_id] }
  expected_confidence_tier: medium
  author: "@eng-data-lead"
  reviewer: "@domain-sme-svfc"

- id: Q-SVFC-025
  question: "Quarter-over-quarter change in overdue loans"
  bu: svfc
  intent_class: trend
  sensitivity_tier: internal
  expected_metric: overdue-qoq@1.0.0
  expected_sql: "SELECT DATE_TRUNC('quarter', originated_at) AS quarter, COUNT(*) FROM svfc.loans WHERE status = 'overdue' AND tenant_id = :tenant_id GROUP BY quarter ORDER BY quarter"
  expected_answer_shape: chart
  expected_numeric_range: null
  expected_citations: { count_min: 2, source_columns: [status, originated_at] }
  expected_confidence_tier: medium
  author: "@eng-data-lead"
  reviewer: "@domain-sme-svfc"

- id: Q-SVFC-026
  question: "How does Hà Nội branch performance compare to TP. HCM?"
  question_vi: "So sánh hiệu quả chi nhánh Hà Nội và TP. HCM?"
  bu: svfc
  intent_class: comparison
  sensitivity_tier: internal
  expected_metric: branch-comparison@1.0.0
  expected_sql: "SELECT b.branch_name, COUNT(l.id) AS loan_count, SUM(l.principal_vnd) AS total_principal FROM svfc.loans l JOIN svfc.branches b ON l.branch_id = b.id WHERE b.province IN ('Hà Nội', 'TP. Hồ Chí Minh') AND l.tenant_id = :tenant_id GROUP BY b.branch_name"
  expected_answer_shape: table
  expected_numeric_range: null
  expected_citations: { count_min: 2, source_columns: [principal_vnd, branch_name] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-svfc"

- id: Q-SVFC-027
  question: "Collections success rate trend over the past 6 months?"
  bu: svfc
  intent_class: trend
  sensitivity_tier: internal
  expected_metric: collections-success-trend@1.0.0
  expected_sql: "SELECT DATE_TRUNC('month', action_date) AS month, COUNT(CASE WHEN outcome = 'promise_to_pay' THEN 1 END)::NUMERIC / COUNT(*) * 100 AS success_pct FROM svfc.collections_actions WHERE action_date >= CURRENT_DATE - INTERVAL '6 months' AND tenant_id = :tenant_id GROUP BY month ORDER BY month"
  expected_answer_shape: chart
  expected_numeric_range: null
  expected_citations: { count_min: 2, source_columns: [outcome, action_date] }
  expected_confidence_tier: medium
  author: "@eng-data-lead"
  reviewer: "@domain-sme-svfc"

