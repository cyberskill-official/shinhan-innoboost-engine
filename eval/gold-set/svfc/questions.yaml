  intent_class: aggregation
  sensitivity_tier: internal
  expected_metric: monthly-disbursement-by-branch@1.0.0
  expected_sql: "SELECT branch_id, SUM(principal_vnd) AS disbursement_vnd FROM svfc.loans WHERE tenant_id = :tenant_id AND originated_at >= '2026-03-01' AND originated_at < '2026-04-01' GROUP BY branch_id"
  expected_answer_shape: table
  expected_numeric_range: null
  expected_citations: { count_min: 1, source_columns: [principal_vnd, branch_id] }
