  expected_metric: account-openings-trend@1.0.0
  expected_sql: "SELECT DATE_TRUNC('month', opened_at) AS month, COUNT(*) FROM securities.accounts WHERE tenant_id = :tenant_id GROUP BY month ORDER BY month"
