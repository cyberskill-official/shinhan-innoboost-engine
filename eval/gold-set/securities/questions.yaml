  expected_citations: { count_min: 3, source_columns: [opened_at] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

- id: Q-SEC-026
  question: "HOSE vs HNX total volume comparison this month?"
  bu: securities
  intent_class: comparison
  sensitivity_tier: public
  expected_metric: exchange-volume-comparison@1.0.0
  expected_sql: "SELECT exchange, SUM(volume) FROM securities.market_data WHERE trade_date >= DATE_TRUNC('month', CURRENT_DATE) AND tenant_id = :tenant_id GROUP BY exchange"
  expected_answer_shape: table
  expected_citations: { count_min: 2, source_columns: [volume, exchange] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

- id: Q-SEC-027
  question: "Individual vs institutional trading activity?"
  bu: securities
  intent_class: comparison
  sensitivity_tier: internal
  expected_metric: investor-type-activity@1.0.0
  expected_sql: "SELECT c.investor_type, COUNT(t.id), SUM(t.amount_vnd) FROM securities.trades t JOIN securities.accounts a ON t.account_id = a.id JOIN securities.customers c ON a.customer_id = c.id WHERE t.tenant_id = :tenant_id GROUP BY c.investor_type"
  expected_answer_shape: table
  expected_citations: { count_min: 2, source_columns: [investor_type, amount_vnd] }
  expected_confidence_tier: medium
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

