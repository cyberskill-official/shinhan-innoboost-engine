# ─── Trend / Comparison (6) ──────────────────────────────

- id: Q-SEC-022
  question: "VNM price trend over the past 6 months?"
  question_vi: "Biểu đồ giá VNM 6 tháng gần nhất?"
  bu: securities
  intent_class: trend
  sensitivity_tier: public
  expected_metric: stock-price-trend@1.0.0
  expected_sql: "SELECT trade_date, close_vnd FROM securities.market_data WHERE symbol = 'VNM' AND trade_date >= CURRENT_DATE - INTERVAL '6 months' AND tenant_id = :tenant_id ORDER BY trade_date"
  expected_answer_shape: chart
  expected_citations: { count_min: 3, source_columns: [close_vnd, trade_date] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

- id: Q-SEC-023
  question: "Compare VCB vs TCB performance over the past year?"
  bu: securities
  intent_class: comparison
  sensitivity_tier: public
  expected_metric: stock-comparison@1.0.0
  expected_sql: "SELECT trade_date, symbol, close_vnd FROM securities.market_data WHERE symbol IN ('VCB', 'TCB') AND trade_date >= CURRENT_DATE - INTERVAL '1 year' AND tenant_id = :tenant_id ORDER BY trade_date"
  expected_answer_shape: chart
  expected_citations: { count_min: 2, source_columns: [close_vnd, symbol] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

- id: Q-SEC-024
  question: "Monthly trading value trend on HOSE?"
  bu: securities
  intent_class: trend
  sensitivity_tier: public
  expected_metric: hose-monthly-trend@1.0.0
  expected_sql: "SELECT DATE_TRUNC('month', trade_date) AS month, SUM(value_vnd) FROM securities.market_data WHERE exchange = 'HOSE' AND tenant_id = :tenant_id GROUP BY month ORDER BY month"
  expected_answer_shape: chart
  expected_citations: { count_min: 3, source_columns: [value_vnd] }
  expected_confidence_tier: high
