# Securities Gold-Set Questions
# Per P04-T01: 30 questions — 12 lookup, 9 aggregation, 6 trend/compare, 3 refusal

- id: Q-SEC-001
  question: "What is the closing price of VNM today?"
  question_vi: "Giá đóng cửa VNM hôm nay?"
  bu: securities
  intent_class: lookup
  sensitivity_tier: public
  expected_metric: stock-close-price@1.0.0
  expected_sql: "SELECT close_vnd FROM securities.market_data WHERE symbol = 'VNM' AND trade_date = CURRENT_DATE AND tenant_id = :tenant_id"
  expected_answer_shape: number
  expected_citations: { count_min: 1, source_columns: [close_vnd] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

