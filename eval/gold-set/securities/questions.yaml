  bu: securities
  intent_class: aggregation
  sensitivity_tier: public
  expected_metric: top-traded-stocks@1.0.0
  expected_sql: "SELECT symbol, SUM(value_vnd) AS total_value FROM securities.market_data WHERE trade_date >= CURRENT_DATE - INTERVAL '7 days' AND tenant_id = :tenant_id GROUP BY symbol ORDER BY total_value DESC LIMIT 10"
  expected_answer_shape: table
  expected_citations: { count_min: 10, source_columns: [symbol, value_vnd] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-sec"

