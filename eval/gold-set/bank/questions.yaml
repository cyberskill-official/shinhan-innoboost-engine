# ─── Trend / Comparison (6) ──────────────────────────────

- id: Q-BANK-022
  question: "Monthly profit trend for all branches over 2025?"
  bu: bank
  intent_class: trend
  sensitivity_tier: internal
  expected_metric: profit-trend@1.0.0
  expected_sql: "SELECT month, SUM(profit_vnd) FROM bank.branch_pnl WHERE month >= '2025-01-01' AND month < '2026-01-01' AND tenant_id = :tenant_id GROUP BY month ORDER BY month"
  expected_answer_shape: chart
  expected_citations: { count_min: 3, source_columns: [profit_vnd, month] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

- id: Q-BANK-023
  question: "Compare SME vs Retail NPL ratio trend?"
  bu: bank
  intent_class: comparison
  sensitivity_tier: internal
  expected_metric: npl-segment-comparison@1.0.0
  expected_sql: "SELECT month, segment, npl_ratio_pct FROM bank.lending_book WHERE segment IN ('SME', 'Retail') AND tenant_id = :tenant_id ORDER BY month"
  expected_answer_shape: chart
  expected_citations: { count_min: 2, source_columns: [npl_ratio_pct, segment] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

- id: Q-BANK-024
  question: "Deposit growth trend by product over the past year?"
  bu: bank
  intent_class: trend
  sensitivity_tier: internal
  expected_metric: deposit-growth@1.0.0
  expected_sql: "SELECT product_type, DATE_TRUNC('month', balance_date) AS month, SUM(balance_vnd) FROM bank.deposit_balances WHERE balance_date >= CURRENT_DATE - INTERVAL '1 year' AND tenant_id = :tenant_id GROUP BY product_type, month ORDER BY month"
  expected_answer_shape: chart
  expected_citations: { count_min: 3, source_columns: [balance_vnd, product_type] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

- id: Q-BANK-025
  question: "Incident frequency trend — is it improving?"
  bu: bank
  intent_class: trend
  sensitivity_tier: internal
  expected_metric: incident-trend@1.0.0
  expected_sql: "SELECT DATE_TRUNC('quarter', incident_date) AS quarter, COUNT(*) FROM bank.ops_incidents WHERE tenant_id = :tenant_id GROUP BY quarter ORDER BY quarter"
  expected_answer_shape: chart
  expected_citations: { count_min: 2, source_columns: [incident_date] }
  expected_confidence_tier: medium
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

- id: Q-BANK-026
  question: "Compare KRW/VND vs JPY/VND net position over time?"
  bu: bank
  intent_class: comparison
  sensitivity_tier: restricted
  expected_metric: fx-pair-comparison@1.0.0
  expected_sql: "SELECT position_date, currency_pair, net_position FROM bank.forex_positions WHERE currency_pair IN ('KRW/VND', 'JPY/VND') AND tenant_id = :tenant_id ORDER BY position_date"
  expected_answer_shape: chart
  expected_citations: { count_min: 2, source_columns: [net_position, currency_pair] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

- id: Q-BANK-027
  question: "Which branch improved cost-income ratio most over the past year?"
  bu: bank
  intent_class: comparison
  sensitivity_tier: internal
  expected_metric: cir-improvement@1.0.0
  expected_sql: "SELECT branch_name, MIN(cost_income_ratio) AS best, MAX(cost_income_ratio) AS worst FROM bank.branch_pnl WHERE month >= CURRENT_DATE - INTERVAL '1 year' AND tenant_id = :tenant_id GROUP BY branch_name ORDER BY (MAX(cost_income_ratio) - MIN(cost_income_ratio)) DESC LIMIT 1"
  expected_answer_shape: table
  expected_citations: { count_min: 1, source_columns: [cost_income_ratio, branch_name] }
  expected_confidence_tier: medium
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

