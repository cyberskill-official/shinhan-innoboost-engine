# Bank HO Gold-Set Questions
# Per P04-T01: 30 questions — 12 lookup, 9 aggregation, 6 trend/compare, 3 refusal

- id: Q-BANK-001
  question: "What is the P&L for Hà Nội branch in March 2026?"
  question_vi: "Lãi lỗ chi nhánh Hà Nội tháng 3/2026?"
  bu: bank
  intent_class: lookup
  sensitivity_tier: internal
  expected_metric: branch-pnl-lookup@1.0.0
  expected_sql: "SELECT revenue_vnd, cost_vnd, profit_vnd FROM bank.branch_pnl WHERE branch_id = 1 AND month = '2026-03-01' AND tenant_id = :tenant_id"
  expected_answer_shape: table
  expected_citations: { count_min: 1, source_columns: [profit_vnd] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

- id: Q-BANK-002
  question: "What is the current net FX position for USD/VND?"
  bu: bank
  intent_class: lookup
  sensitivity_tier: restricted
  expected_metric: fx-position@1.0.0
  expected_sql: "SELECT net_position FROM bank.forex_positions WHERE currency_pair = 'USD/VND' AND position_date = CURRENT_DATE AND tenant_id = :tenant_id"
  expected_answer_shape: number
  expected_citations: { count_min: 1, source_columns: [net_position] }
  expected_confidence_tier: high
  author: "@eng-data-lead"
  reviewer: "@domain-sme-bank"

