version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    reviewers:
      - "@engine-squad"
    groups:
      typescript-tooling:
        patterns:
          - "typescript"
          - "@types/*"
          - "ts-*"
      eslint-tooling:
        patterns:
          - "eslint*"
          - "@typescript-eslint/*"
          - "eslint-plugin-*"
      vitest-tooling:
        patterns:
          - "vitest*"
          - "@vitest/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    reviewers:
      - "@platform-squad"

  - package-ecosystem: "docker"
    directory: "/engine"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/hitl"
    schedule:
      interval: "weekly"

  - package-ecosystem: "docker"
    directory: "/ui"
    schedule:
      interval: "weekly"
