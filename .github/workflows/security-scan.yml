# Security-scan workflow — implements P01-T02
# Nightly full security scan of codebase and published images.

name: security-scan

on:
  schedule:
    - cron: '0 2 * * *'  # 2am UTC daily
  workflow_dispatch:

permissions:
  contents: read
  security-events: write
  issues: write
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_PREFIX: ghcr.io/cyberskill-official/shinhan-innoboost

jobs:
  trivy-full:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workspace: [engine, hitl, ui]
    steps:
      - uses: actions/checkout@v4

      - name: Run Trivy (filesystem)
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'fs'
          scan-ref: './${{ matrix.workspace }}'
          format: 'sarif'
          output: 'trivy-${{ matrix.workspace }}.sarif'
          severity: 'CRITICAL,HIGH'

      - name: Upload Trivy SARIF
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: 'trivy-${{ matrix.workspace }}.sarif'
          category: 'trivy-${{ matrix.workspace }}'

  snyk-deep:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v3
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'pnpm'
      - run: pnpm install --frozen-lockfile

      - name: Run Snyk
        uses: snyk/actions/node@master
        continue-on-error: true
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}
        with:
          args: --all-projects --sarif-file-output=snyk.sarif

      - name: Upload Snyk SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: snyk.sarif
          category: 'snyk'

  semgrep-rules-update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: returntocorp/semgrep-action@v1
        with:
          config: >-
            p/owasp-top-ten
            p/typescript
            p/security-audit
          generateSarif: true

      - name: Upload Semgrep SARIF
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: semgrep.sarif
          category: 'semgrep'

  codeql-full:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v3
        with:
          languages: javascript-typescript

      - name: Autobuild
        uses: github/codeql-action/autobuild@v3

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: 'codeql-nightly'

  gpu-cost-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check GPU spend
        run: |
          echo "--- GPU Cost Check ---"
          echo "TODO: Query Lambda Labs API for weekly spend"
          echo "Alert threshold: \$300/week"
          echo "Implement once Lambda Labs account is active (P00-T05)"

  create-issues:
    runs-on: ubuntu-latest
    needs: [trivy-full, snyk-deep, semgrep-rules-update, codeql-full]
    if: failure()
    steps:
      - name: Create security issue
        uses: actions/github-script@v7
        with:
          script: |
            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `[Security] Nightly scan found issues — ${new Date().toISOString().slice(0,10)}`,
              body: `Nightly security scan detected findings. Review the [Security tab](${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/security) for details.\n\n**Run:** ${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`,
              labels: ['security', 'automated']
            });
